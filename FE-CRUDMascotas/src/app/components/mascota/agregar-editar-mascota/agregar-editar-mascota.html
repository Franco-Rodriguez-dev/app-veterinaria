<div class="title">
    <h1>{{operacion}} Mascota</h1>
</div>
<app-spinner *ngIf="loading"></app-spinner>

<div class="conteiner">
    <mat-card class="card">
        <mat-card-subtitle class="sub">
            Datos de la mascota
        </mat-card-subtitle>
        <form [formGroup]="mascotaForm" (ngSubmit)="agregarEditarMascota()" ><!--(ngSubmit), Angular evita la recarga de página y en su lugar ejecuta el método que vos le indiques.-->
            <mat-grid-list cols="2" rowHeight="80px">
                <mat-grid-tile [colspan]="2">
                    <mat-form-field appearance="outline">
                        <mat-label>Nombre</mat-label>
                        <input formControlName="nombre" matInput>
                    </mat-form-field>
                </mat-grid-tile>
                <mat-grid-tile>
                     <mat-form-field appearance="outline"><!--es para usar el tile cuadrantes para agregar nombre,peso,etc-->
                        <mat-label>Raza</mat-label>
                        <input formControlName="raza" matInput>
                    </mat-form-field>
                </mat-grid-tile>
                <mat-grid-tile>
                     <mat-form-field appearance="outline">
                        <mat-label>Color</mat-label>
                        <input formControlName="color" matInput>
                    </mat-form-field>
                </mat-grid-tile>
                <mat-grid-tile>
                     <mat-form-field appearance="outline">
                        <mat-label>Edad</mat-label>
                        <input type="number" formControlName="edad" matInput><!--type=numbre . obliga al usuaria a usar numeros -->
                    </mat-form-field>
                </mat-grid-tile>
                <mat-grid-tile>
                     <mat-form-field appearance="outline">
                        <mat-label>Peso</mat-label>
                        <input type="number" formControlName="peso" matInput>
                    </mat-form-field>
                </mat-grid-tile>
                <mat-grid-tile [colspan]="2">
                    <button class="btVolver" matButton="outlined" routerLink="/listadoMascota" >Volver</button>
                    <button [disabled]="mascotaForm.invalid" type="submit" matButton="filled">Aceptar</button> 
                    <!--type="submit": dispara el evento de envío del formulario (HTML). [disabled]="mascotaForm.invalid" hasta que no complete
                    el formulario no puede aceptar-->
                </mat-grid-tile>
            </mat-grid-list>
        </form>
    </mat-card>
</div>
