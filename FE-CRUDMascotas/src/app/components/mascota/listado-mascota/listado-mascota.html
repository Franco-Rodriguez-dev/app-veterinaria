<div class="title">
    <h1>Listado De Mascota</h1>
</div>
<app-spinner *ngIf="loading" ></app-spinner>

<div class="conteiner">
    <!--eso sirve para filtrar y buscar por nombre-->
     <mat-form-field>
          <mat-label>Buscar</mat-label>
         <input matInput (keyup)="applyFilter($event)" placeholder="Filtrar" #input autocomplete="off">
     </mat-form-field> 

    <!--matSort se agrega para ordenar hacia arriba o abajo y se lo agregas a la columnas-->
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8"  matSort >

  <ng-container matColumnDef="nombre">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre </th>
    <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
  </ng-container>

  <ng-container matColumnDef="edad">
    <th mat-header-cell *matHeaderCellDef mat-sort-header> Edad </th>
    <td mat-cell *matCellDef="let element"> {{element.edad}} </td>
  </ng-container>

  <ng-container matColumnDef="raza">
    <th mat-header-cell *matHeaderCellDef> Raza </th>
    <td mat-cell *matCellDef="let element"> {{element.raza}} </td>
  </ng-container>

  <ng-container matColumnDef="color">
    <th mat-header-cell *matHeaderCellDef> Color </th>
    <td mat-cell *matCellDef="let element"> {{element.color}} </td>
  </ng-container>

  <ng-container matColumnDef="peso">
    <th mat-header-cell *matHeaderCellDef mat-sort-header >Peso </th>
    <td mat-cell *matCellDef="let element"> {{element.peso}} </td>
  </ng-container>

                     <!--acciones lupa,agregar,borrar - se busca en icons y vas a googlefonts ahi buscas el nombre del icono y lo agregas
                     a la linea de <mat-icon fontIcon ="search" > </mat-icon> ...search es el nombre , creamos una class para darle estilo con css 
  <ng-container matColumnDef="acciones">
    <th mat-header-cell *matHeaderCellDef>

           se puede hacer asi routerLink="/agregar" o [routerLink]="['/agregar']"
        <button  class="gregar"  mat-raised-button color="primary" routerLink="/agregar" > Agregar </button> 
    </th>
    <td mat-cell *matCellDef="let element"> 
        <mat-icon routerLink="/ver/{{element.id}}" matTooltip="ver" class="search" fontIcon ="search" > </mat-icon> agregamos el matTooltip="editar".pasas el mouse y sale info
        <mat-icon routerLink="/editar/{{element.id}}" matTooltip="editar"  class="edit" fontIcon ="edit" > </mat-icon> agregamos el matTooltip="editar".pasas el mouse y sale info
        <mat-icon (click)="eliminarMascota(element.id)" matTooltip="eliminar" class="delete" fontIcon ="delete" > </mat-icon> agregamos el matTooltip="editar".pasas el mouse y sale info
    </td>

  </ng-container>-->

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>

        <!--esto es para pasar la pagina-->
 <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
  </mat-paginator>

  <button mat-raised-button class="mascVolver" color="primary" routerLink="/listadoGeneral">volver</button>

</div>
