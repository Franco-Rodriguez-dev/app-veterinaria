<div class="title">
  <h1>Listado de Personas</h1>
</div>

<!-- Spinner mientras carga -->
<app-spinner *ngIf="loading"></app-spinner>

<div class="container">
  <!-- Campo para buscar personas -->
  <mat-form-field>
    <mat-label>Buscar</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Filtrar por nombre o apellido" #input autocomplete="off">
  </mat-form-field>

  <!-- Tabla -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>

    <!-- Nombre -->
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let persona">{{ persona.nombre }}</td>
    </ng-container>

    <!-- Apellido -->
    <ng-container matColumnDef="apellido">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
      <td mat-cell *matCellDef="let persona">{{ persona.apellido }}</td>
    </ng-container>

    <!-- Edad -->
    <ng-container matColumnDef="edad">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Edad</th>
      <td mat-cell *matCellDef="let persona">{{ persona.edad }}</td>
    </ng-container>

    <!-- Teléfono -->
    <ng-container matColumnDef="telefono">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let persona">{{ persona.telefono }}</td>
    </ng-container>

    <!-- Cantidad de Mascotas -->
    <ng-container matColumnDef="cantMascotas">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Cant. Mascotas</th>
      <td mat-cell *matCellDef="let persona">{{ persona.cantMascotas }}</td>
    </ng-container>

    <!-- Acciones 
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>
        <button mat-raised-button color="primary" routerLink="/agregarPersona">Agregar</button>
      </th>
      <td mat-cell *matCellDef="let persona">
        <mat-icon routerLink="/verPersona/{{persona.id}}" matTooltip="Ver" class="search" fontIcon="search"></mat-icon>
        <mat-icon routerLink="/editarPersona/{{persona.id}}" matTooltip="Editar" class="edit" fontIcon="edit"></mat-icon>
        <mat-icon (click)="eliminarPersona(persona.id)" matTooltip="Eliminar" class="delete" fontIcon="delete"></mat-icon>
      </td>
    </ng-container>-->



    <!-- Filas -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <!-- Paginador -->
  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Seleccionar página">
  </mat-paginator>

  <button mat-raised-button color="primary" routerLink="/listadoGeneral">volver</button>

</div>
