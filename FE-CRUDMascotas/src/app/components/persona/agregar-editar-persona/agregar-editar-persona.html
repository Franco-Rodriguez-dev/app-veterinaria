<div class="title">
  <!-- Cambia dinámicamente entre “Agregar Persona” o “Editar Persona” -->
  <h1>{{operacion}} Persona</h1>
</div>

<!-- Spinner de carga -->
<app-spinner *ngIf="loading"></app-spinner>

<div class="conteiner">
  <mat-card class="card">
    <mat-card-subtitle class="sub">
      Datos de la persona
    </mat-card-subtitle>

    <!-- Formulario reactivo -->
    <form [formGroup]="personaForm" (ngSubmit)="agregarEditarPersona()">
      <mat-grid-list cols="2" rowHeight="80px">

        <!-- Nombre -->
        <mat-grid-tile [colspan]="2">
          <mat-form-field appearance="outline">
            <mat-label>Nombre</mat-label>
            <input formControlName="nombre" matInput>
          </mat-form-field>
        </mat-grid-tile>

        <!-- Apellido -->
        <mat-grid-tile [colspan]="2">
          <mat-form-field appearance="outline">
            <mat-label>Apellido</mat-label>
            <input formControlName="apellido" matInput>
          </mat-form-field>
        </mat-grid-tile>

        <!-- Edad -->
        <mat-grid-tile>
          <mat-form-field appearance="outline">
            <mat-label>Edad</mat-label>
            <input type="number" formControlName="edad" matInput>
          </mat-form-field>
        </mat-grid-tile>

        <!-- Teléfono -->
        <mat-grid-tile>
          <mat-form-field appearance="outline">
            <mat-label>Teléfono</mat-label>
            <input type="text" formControlName="telefono" matInput>
          </mat-form-field>
        </mat-grid-tile>

        <!-- Sexo (selector) -->
        <mat-grid-tile [colspan]="2">
          <mat-form-field appearance="outline">
            <mat-label>Sexo</mat-label>
            <mat-select formControlName="sexo">
              <mat-option value="Masculino">Masculino</mat-option>
              <mat-option value="Femenino">Femenino</mat-option>
              <mat-option value="Otro">Otro</mat-option>
            </mat-select>
          </mat-form-field>
        </mat-grid-tile>

        <!-- Botones -->
        <mat-grid-tile [colspan]="2">
          <button class="btVolver" matButton="outlined" routerLink="/listadoPersona">Volver</button>
          <button [disabled]="personaForm.invalid" type="submit" matButton="filled">Aceptar</button>
        </mat-grid-tile>

      </mat-grid-list>
    </form>
  </mat-card>
</div>
