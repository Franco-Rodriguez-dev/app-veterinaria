<div class="title">
  <h1>🐾 Veterinaria</h1>
</div>

<app-spinner *ngIf="loading"></app-spinner>

  <div class="listado">
    <h2>Ver Listado</h2>
    <a mat-flat-button class="per" routerLink="/listadoPersona"  matTooltip="Listado personas" >Personas</a>
    <a mat-flat-button class="masc" routerLink="/listadoMascota"   matTooltip="Listado mascotas" >Mascota</a>
  </div>

<div class="container">
  <!-- 🔍 Buscar -->
  <mat-form-field class="buscador" appearance="outline">
    <mat-label>Buscar</mat-label>
    <input
      matInput
      (keyup)="applyFilter($event)"
      placeholder="Buscar por persona o mascota"
      autocomplete="off"
    />
    
  </mat-form-field>


  

  <!-- 🧾 Tabla -->
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort>
    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
      <td mat-cell *matCellDef="let e">{{ e.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="apellido">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Apellido</th>
      <td mat-cell *matCellDef="let e">{{ e.apellido }}</td>
    </ng-container>

    <ng-container matColumnDef="telefono">
      <th mat-header-cell *matHeaderCellDef>Teléfono</th>
      <td mat-cell *matCellDef="let e">{{ e.telefono }}</td>
    </ng-container>

    <ng-container matColumnDef="nombreMascota">
      <th mat-header-cell *matHeaderCellDef>Mascota</th>
      <td mat-cell *matCellDef="let e">{{ e.nombreMascota }}</td>
    </ng-container>

    <ng-container matColumnDef="raza">
      <th mat-header-cell *matHeaderCellDef>Raza</th>
      <td mat-cell *matCellDef="let e">{{ e.raza }}</td>
    </ng-container>

    <ng-container matColumnDef="peso">
      <th mat-header-cell *matHeaderCellDef>Peso</th>
      <td mat-cell *matCellDef="let e">{{ e.peso }} kg</td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>
        <button *ngIf="rol === 'Administrador'" mat-raised-button color="primary" (click)="agregar()">Agregar</button>
      </th>
      <td mat-cell *matCellDef="let e">
        <mat-icon matTooltip="Ver" (click)="ver(e)" fontIcon="search"></mat-icon>
        <mat-icon matTooltip="Editar" *ngIf="rol === 'Administrador'" (click)="editar(e)" fontIcon="edit"></mat-icon>
        <mat-icon matTooltip="Eliminar" *ngIf="rol === 'Administrador'" (click)="eliminar(e)" fontIcon="delete"></mat-icon>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
<!--se le agrega esto para la paginacion -->
  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons
      aria-label="Select page of periodic elements"></mat-paginator>  
</div>
