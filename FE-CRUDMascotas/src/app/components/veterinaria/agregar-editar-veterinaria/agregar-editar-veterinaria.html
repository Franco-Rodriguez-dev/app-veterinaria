<div class="container">
  <h1>{{ operacion === 'Editar' ? 'Editar Registro' : 'Registrar Persona y Mascota' }}</h1>
  

  <form [formGroup]="formVeterinaria" (ngSubmit)="agregarEditarVeterinaria()">

    <!-- 🧍 Persona -->
    <mat-card class="card">
      <mat-card-title>Datos de la Persona</mat-card-title>
      <mat-card-content>
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" />
          <mat-error *ngIf="formVeterinaria.get('nombre')?.invalid">Requerido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Apellido</mat-label>
          <input matInput formControlName="apellido" />
          <mat-error *ngIf="formVeterinaria.get('apellido')?.invalid">Requerido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput formControlName="telefono" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Edad</mat-label>
          <input matInput type="number" formControlName="edad" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Sexo</mat-label>
          <mat-select formControlName="sexo">
            <mat-option value="Masculino">Masculino</mat-option>
            <mat-option value="Femenino">Femenino</mat-option>
          </mat-select>
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <!-- 🐶 Mascota -->
    <mat-card class="card" formGroupName="mascota">
      <mat-card-title>Datos de la Mascota</mat-card-title>
      <mat-card-content>
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Raza</mat-label>
          <input matInput formControlName="raza" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Color</mat-label>
          <input matInput formControlName="color" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Edad</mat-label>
          <input matInput type="number" formControlName="edad" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Peso (kg)</mat-label>
          <input matInput type="number" formControlName="peso" />
        </mat-form-field>
      </mat-card-content>
    </mat-card>

    <!-- Botones -->
    <div class="acciones">
      <button mat-raised-button color="primary" type="submit" >
        {{ operacion === 'Editar' ? 'Guardar Cambios' : 'Registrar' }}
      </button>

      <button mat-raised-button color="warn"  (click)="cancelar()">
        Cancelar
      </button>
    </div>

  </form>
</div>
