<div class="title">
  <h1>Veterinaria</h1>
  <p>Iniciar sesion</p>
</div>

<div class="container">
  <mat-card class="card">
    <mat-card-subtitle class="sub">Acceso al sistema</mat-card-subtitle>

    <form (ngSubmit)="login()" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>Usuario</mat-label>
        <input
          matInput
          type="text"
          [(ngModel)]="usuario"
          name="usuario"
          autocomplete="username"
          required
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Contrasena</mat-label>
        <input
          matInput
          type="password"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          required
        />
      </mat-form-field>

      <button matButton="filled" type="submit" [disabled]="!usuario || !password">
        Ingresar
      </button>
    </form>
  </mat-card>
</div>
